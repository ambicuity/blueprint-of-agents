name: Bug Report
description: Report a broken link, formatting issue, or incorrect agent content
title: "[Bug]: "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill out the form below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe the bug you found...
    validations:
      required: true
  - type: input
    id: file
    attributes:
      label: Affected File(s)
      description: Which file(s) contain the issue?
      placeholder: "e.g., blueprints/engineering/frontend-developer.md"
    validations:
      required: false
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or links.
    validations:
      required: false
