name: Improve Existing Agent
description: Suggest improvements to an existing agent blueprint
title: "[Improve]: "
labels: ["enhancement", "improve-agent"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an improvement to an existing agent.
  - type: input
    id: agent-name
    attributes:
      label: Agent Name
      description: Which agent do you want to improve?
      placeholder: "e.g., Frontend Developer"
    validations:
      required: true
  - type: input
    id: agent-file
    attributes:
      label: Agent File Path
      description: Path to the agent file in the repository.
      placeholder: "e.g., blueprints/engineering/frontend-developer.md"
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area of Improvement
      description: What aspect of the agent needs improvement?
      multiple: true
      options:
        - Personality and voice
        - Core mission and responsibilities
        - Technical deliverables and code examples
        - Workflow process
        - Success metrics
        - Advanced capabilities
        - Documentation and clarity
        - Other
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: Current State
      description: What does the agent currently do in this area?
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed Changes
      description: What specific changes would you like to see?
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any examples, references, or reasoning for the improvement.
    validations:
      required: false
