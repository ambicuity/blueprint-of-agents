name: "Linked Issue Enforcer"

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  check-linked-issue:
    name: Linked Issue Check
    runs-on: ubuntu-latest
    # Skip for Dependabot and bot PRs
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const pattern = /(fix(es)?|close(s|d)?|resolve(s|d)?)\s+#\d+/i;

            if (!pattern.test(body)) {
              const comment = [
                '## Linked Issue Required',
                '',
                'Every PR must be linked to an issue. Please add one of the following to your PR description:',
                '',
                '```',
                'Fixes #<issue-number>',
                'Closes #<issue-number>',
                'Resolves #<issue-number>',
                '```',
                '',
                'If no issue exists yet, please [create one](https://github.com/ambicuity/blueprint-of-agents/issues/new/choose) first.',
              ].join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: comment,
              });

              core.setFailed('PR description does not contain a linked issue (Fixes #N, Closes #N, or Resolves #N).');
            } else {
              console.log('Linked issue found in PR description.');
            }
