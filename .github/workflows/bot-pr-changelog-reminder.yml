name: "PR Changelog Reminder"

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  changelog-reminder:
    name: Changelog Check
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check CHANGELOG.md was updated
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const changelogUpdated = files.some(f => f.filename === 'CHANGELOG.md');

            if (!changelogUpdated) {
              const comment = [
                '## Changelog Reminder',
                '',
                'This PR does not include an update to `CHANGELOG.md`.',
                '',
                'Please add a concise entry under `## [Unreleased]` in the appropriate section:',
                '- `### Added` -- for new agents or features',
                '- `### Changed` -- for modifications to existing agents',
                '- `### Fixed` -- for bug fixes',
                '',
                'If this change is trivial (e.g., typo fix), you may disregard this reminder.',
              ].join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: comment,
              });
            }
