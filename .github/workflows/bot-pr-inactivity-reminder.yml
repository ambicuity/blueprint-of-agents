name: "PR Inactivity Reminder"

on:
  schedule:
    - cron: "0 9 * * 1-5"  # Weekdays at 9:00 UTC

permissions:
  pull-requests: write

jobs:
  remind-inactive:
    name: Remind Inactive PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              sort: 'updated',
              direction: 'asc',
              per_page: 50,
            });

            const now = new Date();
            const INACTIVE_DAYS = 5;

            for (const pr of pulls) {
              if (pr.user.login === 'dependabot[bot]') continue;
              if (pr.draft) continue;

              const lastUpdated = new Date(pr.updated_at);
              const daysSinceUpdate = (now - lastUpdated) / (1000 * 60 * 60 * 24);

              if (daysSinceUpdate >= INACTIVE_DAYS) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body: [
                    '## Inactivity Reminder',
                    '',
                    `This PR has been inactive for ${Math.floor(daysSinceUpdate)} days.`,
                    '',
                    '- If you are still working on this, please push an update or comment to reset the timer.',
                    '- If you need help, comment `/need help` and a maintainer will assist.',
                    '- If you want to step away, comment `/unassign` -- no hard feelings.',
                    '',
                    'Inactive PRs may be closed after 14 days without activity.',
                  ].join('\n'),
                });
              }
            }
