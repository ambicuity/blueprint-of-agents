name: "PR Title Check"

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  check-title:
    name: Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check PR title format
        uses: actions/github-script@v9
        with:
          script: |
            const title = context.payload.pull_request.title;

            // Skip if the title is @coderabbitai (auto-rename pending)
            if (title.trim() === '@coderabbitai') {
              console.log('Title is @coderabbitai -- skipping check (auto-rename pending)');
              return;
            }

            const pattern = /^(feat|fix|docs|test|chore|refactor|perf|ci|build|style)(\([a-z0-9\-]+\))?!?: .+$/;

            if (!pattern.test(title)) {
              const body = [
                '## PR Title Check Failed',
                '',
                'Your PR title does not follow the [Conventional Commits](https://www.conventionalcommits.org/) format.',
                '',
                '**Required format:** `<type>(<scope>): <description>`',
                '',
                '**Valid types:** `feat`, `fix`, `docs`, `test`, `chore`, `refactor`, `perf`',
                '',
                '**Examples:**',
                '- `feat(engineering): add cloud infrastructure agent`',
                '- `fix(docs): correct broken link in agent roster`',
                '- `docs(contributing): clarify PR title requirements`',
                '',
                '**Shortcut:** Set the title to `@coderabbitai` and the bot will rename it automatically.',
              ].join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: body,
              });

              core.setFailed('PR title does not follow Conventional Commits format.');
            } else {
              console.log('PR title is valid:', title);
            }
