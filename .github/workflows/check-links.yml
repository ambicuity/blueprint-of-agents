name: "Link Checker"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 4 * * 0"  # Weekly on Sunday at 04:00 UTC

permissions:
  contents: read

jobs:
  check-links:
    name: Check Broken Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --exclude-path .git
            --accept 200,204,301,302,403,429
            '**/*.md'
          fail: true
