name: "Agent Blueprint Lint"

on:
  pull_request:
    branches: [main]
    paths:
      - "blueprints/**/*.md"

permissions:
  contents: read

jobs:
  lint-agents:
    name: Lint Agent Blueprints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate agent file structure
        run: |
          ERRORS=0

          for f in $(git diff --name-only --diff-filter=ACMR origin/main -- 'blueprints/**/*.md'); do
            if [ ! -f "$f" ]; then
              continue
            fi

            echo "Checking: $f"

            # 1. Check YAML frontmatter exists
            if ! head -1 "$f" | grep -q "^---$"; then
              echo "  ERROR: Missing YAML frontmatter opening '---'"
              ERRORS=$((ERRORS + 1))
              continue
            fi

            # 2. Check required frontmatter fields
            FRONTMATTER=$(sed -n '1,/^---$/p' "$f" | tail -n +2 | head -n -1)

            if ! echo "$FRONTMATTER" | grep -q "^name:"; then
              echo "  ERROR: Missing 'name' field in frontmatter"
              ERRORS=$((ERRORS + 1))
            fi

            if ! echo "$FRONTMATTER" | grep -q "^description:"; then
              echo "  ERROR: Missing 'description' field in frontmatter"
              ERRORS=$((ERRORS + 1))
            fi

            # 3. Check for emoji characters (should not be present)
            if grep -P '[\x{1F600}-\x{1F64F}\x{1F300}-\x{1F5FF}\x{1F680}-\x{1F6FF}\x{2600}-\x{26FF}\x{2700}-\x{27BF}]' "$f" > /dev/null 2>&1; then
              echo "  WARNING: Emoji characters detected -- please remove"
            fi

            # 4. Check for required sections
            for section in "Core Mission" "Critical Rules" "Workflow Process" "Success Metrics"; do
              if ! grep -q "$section" "$f"; then
                echo "  WARNING: Missing recommended section: $section"
              fi
            done

            echo "  OK"
          done

          if [ $ERRORS -gt 0 ]; then
            echo ""
            echo "Found $ERRORS validation error(s). See above for details."
            exit 1
          fi

          echo ""
          echo "All changed agent files pass validation."
