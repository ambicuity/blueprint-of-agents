name: "Agent Blueprint Lint"

on:
  pull_request:
    branches: [main]
    paths:
      - "blueprints/**/*.md"

permissions:
  contents: read

jobs:
  lint-agents:
    name: Lint Agent Blueprints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate changed blueprint files
        run: |
          bash ./tools/lint-agents.sh --changed
