name: "Slash Commands"

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  assign:
    name: Handle /assign
    runs-on: ubuntu-latest
    if: >
      !github.event.issue.pull_request &&
      (contains(github.event.comment.body, '/assign') ||
       contains(github.event.comment.body, '.take'))
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const comment = context.payload.comment.body.trim().toLowerCase();
            const user = context.payload.comment.user.login;
            const issueNumber = context.payload.issue.number;

            if (comment === '/assign' || comment === '.take') {
              const issue = context.payload.issue;

              if (issue.assignees.length > 0) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: `This issue is already assigned to @${issue.assignees[0].login}. If they are inactive, a maintainer can reassign it.`,
                });
                return;
              }

              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                assignees: [user],
              });

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: ['in-progress'],
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: [
                  `@${user} -- you are now assigned to this issue.`,
                  '',
                  'Next steps:',
                  '1. Fork the repository and create a feature branch',
                  '2. Make your changes following [CONTRIBUTING.md](https://github.com/ambicuity/blueprint-of-agents/blob/main/CONTRIBUTING.md)',
                  '3. Open a PR with `Fixes #' + issueNumber + '` in the description',
                  '',
                  'You have **7 days** to open a PR. Comment `/working` to reset the timer if you need more time.',
                ].join('\n'),
              });
            }

  unassign:
    name: Handle /unassign
    runs-on: ubuntu-latest
    if: >
      !github.event.issue.pull_request &&
      contains(github.event.comment.body, '/unassign')
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const user = context.payload.comment.user.login;
            const issueNumber = context.payload.issue.number;

            await github.rest.issues.removeAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              assignees: [user],
            });

            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              name: 'in-progress',
            }).catch(() => {});

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `@${user} has been unassigned. This issue is now available for others. Thank you for your time.`,
            });

  need-help:
    name: Handle /need help
    runs-on: ubuntu-latest
    if: >
      !github.event.issue.pull_request &&
      contains(github.event.comment.body, '/need help')
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const user = context.payload.comment.user.login;
            const issueNumber = context.payload.issue.number;

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['help-needed'],
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `@${user} has requested help. @ambicuity -- please review when available.`,
            });
